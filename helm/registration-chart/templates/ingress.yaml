{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "registration-chart.fullname" . }}
  labels:
    {{- include "registration-chart.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: myapp.local
      http:
        paths:
          {{- range .paths }}
          - path: /
            {{- with .pathType }}
            pathType: Prefix
            {{- end }}
            backend:
              service:
                name: {{ include "registration-chart.fullname" $ }}
                port:
                  number: 5000
          {{- end }}
    {{- end }}
{{- end }}
