services:

  mysql:
    image: mysql:5.7
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usersdb
    ports:
      - "3306:3306"

  backend:
    build: .
    container_name: backend-app
    depends_on:
      - mysql
    restart: always
    ports:
      - "5000:5000"
